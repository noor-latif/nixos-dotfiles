# Tron: Ares (Dillinger Grid) - kitty
# Keep config file-based (symlinked via Home Manager).

include colors-tron-ares.conf

font_family      JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0

cursor_shape block
cursor_blink_interval 0

# Cursor trail (kitty 0.37+)
cursor_trail 200
cursor_trail_decay 0.08 0.25
cursor_trail_start_threshold 2
cursor_trail_color #ff0000

enable_audio_bell no
visual_bell_duration 0

shell_integration enabled

background_opacity 0.80
dynamic_background_opacity yes

window_border_width 2
draw_minimal_borders yes
window_padding_width 6
placement_strategy top-left

tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_margin_width 0
tab_bar_margin_height 0

confirm_os_window_close 0
